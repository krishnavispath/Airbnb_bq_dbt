models:
  - name: dim_listings_cleansed
    description: "Cleansed dimension table for Airbnb listings"
    data_tests:
      - minimum_row_count:
          arguments:
            min_rows: 1000
          severity: error
    columns:
      - name: listing_id
        description: "Primary key for each listing"
        data_tests:
          - not_null
          - unique

      - name: host_id
        description: "Foreign key referencing the host table"
        data_tests:
          - not_null
          - dbt_utils.relationships_where:
              arguments:
                to: ref('dim_hosts_cleansed')
                field: host_id

      - name: room_type
        description: "Type of room offered in the listing"
        data_tests:
          - accepted_values:
              arguments:
                values: ['Entire home/apt', 'Private room', 'Shared room', 'Hotel room']

      - name: minimum_nights
        description: '{{ doc("dim_listing_cleansed_minimum_nights") }}'
        data_tests:
          - positive_values

  - name: dim_hosts_cleansed
    description: "Cleansed dimension table for Airbnb hosts"
    config:
      contract:
        enforced: true
    columns:
      - name: host_id
        data_type: integer
        description: "Primary key for each host"
      - name: host_name
        data_type: string
        description: "Name of the host"
      - name: is_superhost
        data_type: boolean
        description: "Indicates if the host is a superhost"
      - name: created_at
        data_type: timestamp
        description: "Timestamp when the host record was created"
      - name: updated_at
        data_type: timestamp
        description: "Timestamp when the host record was last updated"