unit_tests:
  - name: unittest_fullmoon_matcher
    model: mart_fullmoon_reviews
    given:
      - input: ref('fct_reviews')
        rows:
          - {review_date: '2013-02-24'}
          - {review_date: '2013-02-25'}
          - {review_date: '2013-02-26'}
      - input: ref('seed_full_moon_dates')
        rows:
          - {full_moon_date: '2013-02-25'}
    expect:
      rows:
        - {review_date: '2013-02-24', is_full_moon: 'not full moon'}
        - {review_date: '2013-02-25', is_full_moon: 'not full moon'}
        - {review_date: '2013-02-26', is_full_moon: 'full moon'}

